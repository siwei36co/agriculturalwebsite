<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地市数据 - 广西农业现代化发展数据平台</title>
    <link rel="stylesheet" href="vendor/bootstrap/5.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="vendor/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="images/favicon/favicon.svg">
    <meta name="theme-color" content="#198754">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img class="brand-mark me-2" src="images/favicon/brand-mark.svg" alt="" aria-hidden="true">广西农业现代化发展数据平台
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="statistics.html">统计分析</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cities.html">地市数据</a></li>
                    <li class="nav-item"><a class="nav-link" href="industry.html">糖市行情</a></li>
                    <li class="nav-item"><a class="nav-link" href="announcement.html">公告</a></li>
                    <li class="nav-item"><a class="nav-link" href="research.html">研究成果</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <h2 class="mb-4"><i class="bi bi-geo-alt"></i> 广西14地级市农业数据（2024年）</h2>

            <!-- 排序/筛选 -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label">排序指标</label>
                            <select class="form-select" id="sortField">
                                <option value="primaryGVA">第一产业增加值</option>
                                <option value="gdp">GDP</option>
                                <option value="grain">粮食产量</option>
                                <option value="cane">甘蔗入榨量</option>
                                <option value="fruit">水果产量</option>
                                <option value="ruralIncome">农村人均收入</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">排序</label>
                            <select class="form-select" id="sortOrder">
                                <option value="desc">降序</option>
                                <option value="asc">升序</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">搜索城市</label>
                            <input type="text" class="form-control" id="citySearch" placeholder="输入城市名称...">
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-success w-100" id="btnSort"><i class="bi bi-funnel"></i> 筛选</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 图表 -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="bi bi-bar-chart"></i> 各市第一产业增加值对比</h5>
                </div>
                <div class="card-body">
                    <div style="position:relative;height:420px"><canvas id="cityChart"></canvas></div>
                </div>
            </div>

            <!-- 城市卡片列表 -->
            <div class="row" id="cityCards"></div>
        </div>
    </main>

    <footer class="bg-light py-4 mt-5">
        <div class="container text-center">
            <p class="text-muted mb-1">&copy; 2026 广西农业现代化发展数据平台</p>
            <p class="text-muted mb-0"><small>数据来源：广西壮族自治区统计局、国家统计局、广西农业农村厅等</small></p>
        </div>
    </footer>

    <script src="vendor/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
    <script src="vendor/chart.js/3.9.1/chart.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/cities.js"></script>
</body>
</html>
